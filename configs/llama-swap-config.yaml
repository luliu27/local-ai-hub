# Groups: control swapping behavior for sets of models
groups:
  # Small always-on model that won't be unloaded when other models run
  always-on:
    persistent: true
    swap: false
    exclusive: false
    members:
      - "qwen3.5-2b"

  # Large models - only one at a time, will unload the always-on model
  large-models:
    swap: true
    exclusive: true
    members:
      - "qwen3.5-9b"
      - "qwen3.6-27b"
      - "qwen3.6-27b-thinking"
      - "qwen3.6-27b-coding"
      - "qwen3.6-35b-a3b-thinking"
      - "qwen3.6-35b-a3b-thinking-coding"
      - "qwen3.6-35b-a3b-instruct-general"
      - "qwen3.6-35b-a3b-instruct-reasoning"
      - "gpt-oss-20b"
      - "gemma4-31b"

# 
# Optional: API keys to restrict access to the proxy endpoints
# apiKeys:
#   - "your-api-key-here"

# Optional: settings you may want to tune in production
# maxUpstreamStartTime: 60   # seconds to wait for upstream to start
# logLevel: info
