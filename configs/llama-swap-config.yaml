# config.yaml
# llama-swap configuration to run local llama-server models on demand.
# to run llama-swap: `llama-swap --config config.yaml --listen 0.0.0.0:1235`
#
# Models are stored in: ${HOME}/.cache/huggingface/hub
# one way to download models: `llama-server -hf unsloth/gemma-4-E4B-it-GGUF:UD-Q4_K_XL`
#
# When a request arrives for a model, llama-swap will start the corresponding
# `llama-server` command on a dynamically assigned ${PORT} and stop any other
# running upstream so only one model is active at a time besides always-on models.

# global server listen address (this doesn't seem to work properly)
listen: "localhost:1235"

# Optional: enable watching the config file for hot reload (useful during testing)
# watch-config: true

# macros extracted from model entries
macros:
  # common context size used by the configured models
  default_ctx: 120000
  # default threads for llama-server
  threads: "8"
  # enable cache prompt flag; empty string to disable
  cache_prompt: "--cache-prompt"
  # ub (user buffer) value
  ub: "512"
  # repetition penalty (float as string)
  repeat_penalty: "1.0"
  # presence penalty (float as string)
  presence_penalty: "0.0"
  # absolute path to llama-server binary
  llama_server_bin: "/opt/homebrew/bin/llama-server"
  # --jinja only for qwen3.5, deepseek, etc.
  jinja: "--jinja"

models:
  qwen3.5-2b:
    # command to launch llama-server; ${PORT} will be replaced by llama-swap
    cmd: >
      ${llama_server_bin} --port ${PORT}
      -hf unsloth/Qwen3.5-2B-GGUF:BF16
      --ctx-size ${default_ctx}
      --threads ${threads}
      ${cache_prompt} -ub ${ub}
      ${jinja}
      --reasoning off
      --reasoning-budget 0
      --repeat-penalty ${repeat_penalty}
      --presence_penalty ${presence_penalty}
      --seed 4242
      --temp 0.5
      --top-k 20
      --top-p 0.8
      --min-p 0.00
      --mirostat 0
    useModelName: "qwen3.5-2b"
    aliases:
      - "qwen-2b"
      - "qwen3.5-2b"
    # ttl: 0 means do not auto-unload due to inactivity; llama-swap will still
    # stop this model when another model is requested.
    ttl: 0

  qwen3.5-9b:
